<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Event</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .event-card {
            width: 100%;
            max-width: 550px;
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,.25);
        }

        .event-title {
            text-align: center;
            font-weight: 700;
            color: #4f46e5;
            margin-bottom: 25px;
        }

        .form-control{
            border-radius:12px;
            padding:12px;
        }

        .btn-event{
            width:100%;
            background:#4f46e5;
            color:white;
            border:none;
            border-radius:12px;
            padding:12px;
            font-size:18px;
            font-weight:600;
        }

        .btn-event:hover{
            background:#4338ca;
            color:white;
        }

        @media (max-width:576px){

            body{
                padding:15px;
            }

            .event-card{
                padding:22px;
            }

            .event-title{
                font-size:28px;
            }

            .btn-event{
                font-size:16px;
            }
        }
    </style>

</head>

<body>

<div class="event-card">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <a href="/dashboard" class="btn btn-outline-secondary">
            ← Back
        </a>

        <h4 class="fw-bold text-primary m-0">
            🎉 Add Event
        </h4>

    </div>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label fw-semibold">
                Event Name
            </label>

            <input
                type="text"
                name="name"
                class="form-control"
                placeholder="Enter Event Name"
                required>
        </div>

        <div class="mb-3">

            <label class="form-label fw-semibold">
                Event Date
            </label>

            <input
                type="date"
                name="date"
                class="form-control"
                required>

        </div>

        <div class="mb-4">

            <label class="form-label fw-semibold">
                Venue
            </label>

            <input
                type="text"
                name="venue"
                class="form-control"
                placeholder="Enter Venue"
                required>

        </div>

        <button class="btn-event">
            ➕ Add Event
        </button>

    </form>

</div>

</body>
</html>
