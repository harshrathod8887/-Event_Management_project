<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            margin:0;
            padding:0;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4f46e5,#7c3aed,#2563eb);
            font-family:Arial, Helvetica, sans-serif;
        }

        .login-card{
            width:100%;
            max-width:420px;
            padding:40px;
            border-radius:20px;
            background:rgba(255,255,255,.95);
            backdrop-filter:blur(10px);
            box-shadow:0 15px 40px rgba(0,0,0,.25);
        }

        h2{
            text-align:center;
            font-weight:bold;
            margin-bottom:30px;
            color:#4f46e5;
        }

        .form-control{
            height:50px;
            border-radius:10px;
        }

        .btn-primary{
            height:50px;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
            transition:.3s;
        }

        .btn-primary:hover{
            transform:translateY(-2px);
        }

        .footer-text{
            text-align:center;
            margin-top:20px;
            color:#666;
            font-size:14px;
        }

        @media(max-width:576px){

            .login-card{
                margin:20px;
                padding:30px 20px;
            }

            h2{
                font-size:28px;
            }

        }
    </style>

</head>

<body>

<div class="login-card">

    <h2>🔐 Admin Login</h2>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter Username"
                required>
        </div>

        <div class="mb-4">
            <label class="form-label">Password</label>
            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter Password"
                required>
        </div>

        <button class="btn btn-primary w-100">
            Login
        </button>

    </form>

    <div class="footer-text">
        Event Management System
    </div>

</div>

</body>
</html>
