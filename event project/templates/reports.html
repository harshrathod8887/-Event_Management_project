<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background:
                linear-gradient(rgba(0, 0, 0, 0.55),
                    rgba(0, 0, 0, 0.55)),
                url('https://images.unsplash.com/photo-1511578314322-379afb476865');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: Poppins, sans-serif;
        }

        .glass-card {
            background: rgba(255,255,255,.12);
            backdrop-filter: blur(12px);
            border-radius: 25px;
            padding: 30px;
            margin:40px auto;
            color:white;
        }

        .title{
            font-weight:700;
        }

        .stat-card{
            border:none;
            border-radius:20px;
            color:white;
            padding:25px;
            transition:.3s;
            text-align:center;
        }

        .stat-card:hover{
            transform:translateY(-5px);
        }

        .purple{
            background:linear-gradient(135deg,#6366f1,#8b5cf6);
        }

        .green{
            background:linear-gradient(135deg,#10b981,#059669);
        }

        .table-box{
            background:rgba(255,255,255,.08);
            border-radius:20px;
            overflow:hidden;
            margin-top:30px;
        }

        .table{
            color:white;
            margin-bottom:0;
        }

        .table thead{
            background:#4f46e5;
        }

        .table thead th{
            color:white;
            border:none;
        }

        .table tbody tr:hover{
            background:rgba(255,255,255,.15);
        }

        .btn-back{
            background:#4f46e5;
            color:white;
            border:none;
            border-radius:12px;
            padding:10px 20px;
        }

        .btn-back:hover{
            background:#4338ca;
            color:white;
        }

        .badge-custom{
            background:#10b981;
            color:white;
            padding:8px 15px;
            border-radius:20px;
        }

        @media(max-width:768px){

            .glass-card{
                padding:20px;
            }

            .header-box{
                flex-direction:column;
                gap:15px;
                text-align:center;
            }

            .title{
                font-size:28px;
            }

            .stat-card{
                margin-bottom:15px;
            }
        }
    </style>
</head>

<body>

<div class="container">

<div class="glass-card">

<div class="d-flex justify-content-between align-items-center mb-4 header-box">

<h2 class="title">📑 Reports Dashboard</h2>

<a href="/dashboard" class="btn btn-back">
← Back to Dashboard
</a>

</div>

<div class="row">

<div class="col-lg-6 col-md-6 mb-3">
<div class="stat-card purple">
<h5>Total Events</h5>
<h1>{{ total_events }}</h1>
</div>
</div>

<div class="col-lg-6 col-md-6 mb-3">
<div class="stat-card green">
<h5>Total Participants</h5>
<h1>{{ total_participants }}</h1>
</div>
</div>

</div>
<div class="table-box mt-4">

<div class="table-responsive">

<table class="table table-hover align-middle">

<thead>
<tr>
<th>#</th>
<th>Event Name</th>
<th>Participants</th>
<th>Status</th>
</tr>
</thead>

<tbody>

{% for e in event_wise %}

<tr>

<td>{{ loop.index }}</td>

<td>{{ e.name }}</td>

<td>{{ e.total }}</td>

<td>
<span class="badge-custom">
Active
</span>
</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</div>

</body>
</html>
